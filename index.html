<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#7c3aed;--accent-mid:#8b5cf6;--accent-light:#ede9fe;
  --gold:#f59e0b;--gold-light:#fef3c7;
  --green:#22c55e;--green-light:#f0fdf4;
  --red:#ef4444;--orange:#f97316;
  --surface:#ffffff;--surface2:#f8f7ff;
  --border:#e9d5ff;--text:#1e1b4b;--text-muted:#7c7a9a;
  --radius:18px;--radius-sm:12px;
}
html,body{height:100%;background:var(--surface2);color:var(--text);font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100dvh}

/* PICKER */
#profile-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:2rem 1.5rem;gap:1.5rem}
.picker-title{font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:30px;color:var(--text);text-align:center}
.picker-sub{font-size:15px;font-weight:600;color:var(--text-muted);text-align:center;margin-top:-1rem}
.picker-cards{display:flex;flex-direction:column;gap:16px;width:100%}
.picker-card{background:var(--surface);border:3px solid var(--border);border-radius:24px;padding:1.2rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:transform .12s;user-select:none}
.picker-card:active{transform:scale(.97)}
.picker-avatar-wrap{width:72px;height:72px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.picker-emoji{font-size:52px;text-align:center}
.picker-info{flex:1}
.picker-name{font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:26px;line-height:1}
.picker-coins{font-size:14px;font-weight:700;color:var(--text-muted);margin-top:3px}
.picker-arrow{font-size:28px;color:var(--text-muted)}

/* APP */
#app{display:none;flex-direction:column;min-height:100dvh;padding-bottom:90px}
#app.visible{display:flex}

/* HEADER */
.header{padding:1.2rem 1.2rem 1.8rem;border-radius:0 0 28px 28px;color:white;position:relative;text-align:center;background:linear-gradient(140deg,var(--accent) 0%,var(--accent) 100%);box-shadow:0 4px 24px rgba(0,0,0,.1);transition:background .4s}
.header-back,.settings-btn{position:absolute;top:14px;background:rgba(255,255,255,.2);border:none;border-radius:50%;width:38px;height:38px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white}
.header-back{left:14px}
.settings-btn{right:14px}
.badge-wrap{position:relative;display:inline-flex}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--orange);color:white;font-size:10px;font-weight:800;font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border:2px solid white}
.header-avatar-wrap{width:64px;height:64px;margin:0 auto 4px;display:flex;align-items:center;justify-content:center}
.header-emoji{font-size:44px;line-height:1}
.header-name{font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:24px;letter-spacing:.5px}
.coin-breakdown{display:inline-flex;gap:10px;margin-top:10px;background:rgba(0,0,0,.08);border:1.5px solid rgba(0,0,0,.12);border-radius:14px;padding:8px 16px}
.cb-row{font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:14px;color:inherit;white-space:nowrap}

/* STREAK */
.streak-row{display:flex;align-items:center;justify-content:center;gap:6px;margin:1rem 1.2rem 0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;flex-wrap:wrap}
.streak-dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--text-muted);transition:background .3s,border-color .3s}
.streak-dot.lit{background:var(--accent);border-color:var(--accent);color:var(--header-text,white)}
.streak-lbl{font-size:13px;font-weight:700;color:var(--text-muted);margin-left:4px;white-space:nowrap}

/* TABS */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1.5px solid var(--border);display:flex;z-index:100}
.tab-btn{flex:1;background:none;border:none;padding:8px 0 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:10px;font-weight:700;color:var(--text-muted);transition:color .15s}
.tab-btn.active{color:var(--accent)}
.tab-icon{font-size:20px}

/* SECTIONS */
.section{display:none;padding:0 1.2rem 1.5rem}
.section.active{display:block}
.sec-label{font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:17px;color:var(--accent);margin:1.2rem 0 .6rem}

/* CHORE CARDS */
.chore-list{display:flex;flex-direction:column;gap:10px}
.chore-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:13px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .1s,border-color .2s,background .2s,opacity .2s;user-select:none}
.chore-card:active{transform:scale(.97)}
.chore-card.done{background:var(--green-light);border-color:#86efac;opacity:.8}
.chore-card.pending{background:#fff7ed;border-color:#fed7aa;opacity:.9}
.chore-card.blocked{opacity:.45;cursor:default}
.chore-emoji{font-size:34px;width:46px;text-align:center;flex-shrink:0}
.chore-info{flex:1;min-width:0}
.chore-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.25}
.chore-card.done .chore-name{text-decoration:line-through;color:var(--text-muted)}
.chore-coins{font-size:13px;color:var(--accent);font-weight:700;margin-top:2px}
.chore-status{font-size:12px;font-weight:700;color:var(--orange);margin-top:2px}
.chore-check{width:46px;height:46px;border-radius:50%;border:2.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;transition:all .15s}
.chore-card.done .chore-check{background:var(--green);border-color:var(--green)}
.chore-card.pending .chore-check{background:var(--orange);border-color:var(--orange)}

.progress-wrap{margin:.8rem 0 0;background:var(--border);border-radius:50px;height:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:50px;transition:width .4s ease}
.progress-lbl{font-size:12px;font-weight:700;color:var(--text-muted);margin-top:4px;text-align:right}
.empty-msg{text-align:center;font-size:15px;color:var(--text-muted);font-weight:600;padding:2rem 0}

/* SURPRISE */
.surprise-box{background:var(--gold-light);border:2px dashed var(--gold);border-radius:var(--radius);padding:1.2rem;text-align:center;margin-top:1.2rem}
.surprise-title{font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:18px;color:#92400e;margin-bottom:6px}
.surprise-text{font-size:15px;font-weight:700;color:#78350f;min-height:42px;margin-bottom:10px}
.surprise-coins{font-size:13px;color:#b45309;font-weight:700;margin-bottom:10px}
.btn-gold{background:var(--gold);color:white;border:none;border-radius:50px;padding:11px 28px;font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:16px;cursor:pointer;transition:transform .1s;display:inline-block}
.btn-gold:active{transform:scale(.96)}
.btn-gold:disabled{background:#d1d5db;cursor:default}

/* SHOP */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.shop-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;cursor:pointer;transition:transform .1s,border-color .15s;user-select:none}
.shop-card:active{transform:scale(.96)}
.shop-card.affordable{border-color:var(--accent)}
.shop-card.cant-afford{opacity:.5;cursor:default}
.shop-emoji{font-size:32px;margin-bottom:5px}
.shop-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.2}
.shop-cost{font-size:14px;color:var(--accent);font-weight:800}
.shop-card.cant-afford .shop-cost{color:var(--text-muted)}

/* HISTORY */
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.hi-left{font-weight:700;color:var(--text)}
.hi-right{font-weight:800;color:var(--accent);white-space:nowrap;margin-left:8px}
.hi-date{font-size:11px;color:var(--text-muted);font-weight:600;margin-top:1px}
.hi-neg{color:var(--red)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,27,74,.6);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:1.5rem 1.4rem 2rem;width:100%;max-width:430px;max-height:88dvh;overflow-y:auto}
.modal-title{font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:20px;color:var(--accent);margin-bottom:1rem;text-align:center}

/* PIN */
.pin-row{display:flex;gap:8px;margin-bottom:1rem}
.pin-input{flex:1;font-size:28px;font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;text-align:center;border:2px solid var(--border);border-radius:var(--radius-sm);padding:10px;color:var(--text);background:var(--surface);letter-spacing:8px;outline:none}
.pin-input:focus{border-color:var(--accent)}
.pin-error{font-size:13px;color:var(--red);font-weight:700;text-align:center;margin-top:6px}

/* BUTTONS */
.btn-purple{background:var(--accent);color:white;border:none;border-radius:50px;padding:12px 28px;font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:16px;cursor:pointer;width:100%;margin-top:8px;transition:opacity .15s}
.btn-purple:hover{opacity:.88}
.btn-danger{background:var(--red);color:white;border:none;border-radius:50px;padding:12px 28px;font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:16px;cursor:pointer;width:100%;margin-top:10px}
.btn-success{background:var(--green);color:white;border:none;border-radius:50px;padding:12px 28px;font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:16px;cursor:pointer;width:100%;margin-top:8px}
.btn-close{background:var(--surface2);color:var(--text-muted);border:1.5px solid var(--border);border-radius:50px;padding:10px 28px;font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:15px;cursor:pointer;width:100%;margin-top:8px}
.btn-sm{background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:14px;cursor:pointer;white-space:nowrap}
.btn-sm-danger{background:var(--red);color:white;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:14px;cursor:pointer}
.btn-sm-success{background:var(--green);color:white;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:14px;cursor:pointer}

/* PARENT PANEL INTERNALS */
.parent-section{display:none}
.parent-section.unlocked{display:block}
.kid-tabs{display:flex;gap:8px;margin-bottom:14px}
.kid-tab{flex:1;padding:8px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--surface2);font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:15px;cursor:pointer;text-align:center;color:var(--text-muted);transition:all .15s}
.kid-tab.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.parent-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.parent-nav-btn{flex:1;min-width:80px;padding:9px 8px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface2);font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:13px;cursor:pointer;text-align:center;color:var(--text-muted);transition:all .15s;position:relative}
.parent-nav-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.parent-nav-badge{position:absolute;top:-6px;right:-6px;background:var(--orange);color:white;font-size:10px;font-weight:800;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border:2px solid white}
.parent-stat{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:10px;font-size:14px;font-weight:700;color:var(--text);display:flex;justify-content:space-between}
.parent-stat span{color:var(--accent);font-size:16px}
.add-coins-row{display:flex;gap:8px;margin-bottom:10px}
.add-coins-row input{flex:1;font-size:16px;font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;border:2px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);background:var(--surface);outline:none}
.add-coins-row input:focus{border-color:var(--accent)}

/* APPROVAL CARDS */
.approval-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.approval-card.chore-type{border-left:4px solid var(--orange)}
.approval-card.shop-type{border-left:4px solid var(--accent)}
.approval-meta{font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:4px}
.approval-label{font-size:15px;font-weight:800;color:var(--text);margin-bottom:10px}
.approval-actions{display:flex;gap:8px}

/* EDITOR */
.editor-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.editor-item-info{flex:1;min-width:0}
.editor-item-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.editor-item-sub{font-size:12px;color:var(--text-muted);font-weight:600;margin-top:1px}
.editor-actions{display:flex;gap:6px;flex-shrink:0}
.add-form{background:var(--surface2);border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px}
.add-form input,.add-form select{width:100%;font-size:14px;font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);background:var(--surface);outline:none;margin-bottom:8px}
.add-form input:focus,.add-form select:focus{border-color:var(--accent)}
.add-form-row{display:flex;gap:8px}
.add-form-row input{margin-bottom:0}
.form-label{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:4px}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--green);color:white;font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:16px;padding:11px 24px;border-radius:50px;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.18)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.bad{background:var(--red)}
.toast.info{background:var(--accent)}
.toast.warn{background:var(--orange)}

/* CONFETTI */
.confetti-piece{position:fixed;top:-10px;border-radius:2px;animation:fall linear forwards;pointer-events:none;z-index:9999}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* DRAGON SVG */
.dragon-svg{width:100%;height:100%}
</style>
</head>
<body>
<!-- Sync indicator -->
<div id="sync-indicator" style="display:none;position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,0.6);color:white;font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:15px;padding:10px;text-align:center;z-index:9999;align-items:center;justify-content:center;gap:8px">
  <div style="width:18px;height:18px;border:3px solid white;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite"></div>
  Loading your data...
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<!-- PROFILE PICKER -->
<div id="profile-screen">
  <div class="picker-title">⭐ Chore Quest ⭐</div>
  <div class="picker-sub">Who's doing chores today?</div>
  <div class="picker-cards" id="picker-cards"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="header" id="main-header">
    <button class="header-back" onclick="goBack()">👈</button>
    <div class="badge-wrap" style="position:absolute;top:14px;right:14px">
      <button class="settings-btn" style="position:static" onclick="openParent()">⚙️</button>
      <div class="notif-badge" id="header-badge" style="display:none">0</div>

// ==================== FIREBASE SYNC ====================
const DB_PREFIX = 'chorequest';

function kidStateRef(kidId){ return window.db.ref(`${DB_PREFIX}/states/${kidId}`); }
function globalRef(){ return window.db.ref(`${DB_PREFIX}/global`); }

// Serialize state (convert Sets to arrays)
function serializeState(s){
  const done={};
  for(const [d,val] of Object.entries(s.done||{})){
    done[d] = val instanceof Set ? [...val] : (Array.isArray(val) ? val : Object.values(val));
  }
  return {
    coins: s.coins||0,
    coinsEarned: s.coinsEarned||0,
    coinsDeducted: s.coinsDeducted||0,
    streak: s.streak||0,
    lastActiveDate: s.lastActiveDate||null,
    done,
    surprise: s.surprise||{},
    history: toArray(s.history),
    pendingChores: toArray(s.pendingChores),
    pendingShop: toArray(s.pendingShop),
    oopsLog: toArray(s.oopsLog),
    baseBedtime: s.baseBedtime||'19:45',
    bedtimeAdjustments: s.bedtimeAdjustments||{},
  };
}

// Deserialize state (convert arrays back to Sets)
function toArray(val){
  if(!val) return [];
  if(Array.isArray(val)) return val;
  if(typeof val === 'object') return Object.values(val);
  return [];
}

const EMPTY_STATE = () => ({ coins:0, coinsEarned:0, coinsDeducted:0, streak:0, lastActiveDate:null, done:{}, surprise:{}, history:[], pendingChores:[], pendingShop:[], oopsLog:[], baseBedtime:'19:45', bedtimeAdjustments:{} });

function deserializeState(raw){
  try {
    if(!raw) return EMPTY_STATE();
    const done={};
    if(raw.done && typeof raw.done === 'object') {
      for(const [d,a] of Object.entries(raw.done)) done[d]=new Set(toArray(a));
    }
    const surprise={};
    if(raw.surprise && typeof raw.surprise === 'object') {
      for(const [d,v] of Object.entries(raw.surprise)) surprise[d]=v;
    }
    return {
      coins: raw.coins||0,
      coinsEarned: raw.coinsEarned||0,
      coinsDeducted: raw.coinsDeducted||0,
      streak: raw.streak||0,
      lastActiveDate: raw.lastActiveDate||null,
      done,
      surprise,
      history: toArray(raw.history),
      pendingChores: toArray(raw.pendingChores),
      pendingShop: toArray(raw.pendingShop),
      oopsLog: toArray(raw.oopsLog),
      baseBedtime: raw.baseBedtime||'19:45',
      bedtimeAdjustments: raw.bedtimeAdjustments||{},
    };
  } catch(e) {
    console.warn('deserializeState error:', e);
    return EMPTY_STATE();
  }
}

// Save kid state to Firebase
function saveKidState(kidId, s){
  kidStateRef(kidId).set(serializeState(s)).catch(e=>console.error('Save error',e));
}

// Save global config to Firebase
function saveGlobal(g){
  globalRef().set(g).catch(e=>console.error('Save global error',e));
}

// Loading indicator
function showSyncing(show){
  const el=document.getElementById('sync-indicator');
  if(el) el.style.display=show?'flex':'none';
}

// Initial load from Firebase — returns a promise
function loadAllFromFirebase(){
  return new Promise((resolve)=>{
    showSyncing(true);
    let loaded=0;
    let resolved=false;
    const total=CONFIG.kids.length+1;

    function tryResolve(){
      loaded++;
      if(loaded>=total&&!resolved){
        resolved=true;
        showSyncing(false);
        resolve();
      }
    }

    // Timeout fallback — resolve after 6s no matter what
    setTimeout(()=>{
      if(!resolved){
        resolved=true;
        showSyncing(false);
        // Fill in any missing states with empty defaults
        for(const kid of CONFIG.kids){
          if(!states[kid.id]) states[kid.id]=EMPTY_STATE();
        }
        resolve();
      }
    }, 3000);

    // Load global config using once()
    globalRef().once('value').then(snap=>{
      const val=snap.val();
      if(val){
        if(val.shop) globalCfg.shop=val.shop;
        if(val.consequences) globalCfg.consequences=val.consequences;
        if(val.surprises) globalCfg.surprises=val.surprises;
        if(val.kidConfigs) globalCfg.kidConfigs=val.kidConfigs;
      }
      tryResolve();
    }).catch(e=>{ console.warn('Global load error',e); tryResolve(); });

    // Load each kid state using once() — separate from the on() subscribers
    for(const kid of CONFIG.kids){
      kidStateRef(kid.id).once('value').then(snap=>{
        states[kid.id]=deserializeState(snap.val());
        tryResolve();
      }).catch(e=>{
        console.warn('Kid state load error',e);
        states[kid.id]=EMPTY_STATE();
        tryResolve();
      });
    }
  });
}

// Subscribe to real-time updates for a kid
function subscribeToKid(kidId){
  kidStateRef(kidId).on('value', snap=>{
    try {
      if(!initialLoadComplete) return; // ignore events during initial load
      const val = snap.val();
      if(val === null) return; // ignore empty nodes
      const newState=deserializeState(val);
      states[kidId]=newState;
      updateBadge();
      if(!activeKid) renderPicker();
      if(activeKid&&activeKid.id===kidId) setTimeout(renderAll, 80);
    } catch(e){ console.warn('subscribeToKid error:', e); }
  });
}

// Subscribe to global config changes
function subscribeToGlobal(){
  globalRef().on('value', snap=>{
    try {
      if(!initialLoadComplete) return;
      const val=snap.val();
      if(val){
        if(val.shop) globalCfg.shop=val.shop;
        if(val.consequences) globalCfg.consequences=val.consequences;
        if(val.surprises) globalCfg.surprises=val.surprises;
        if(val.kidConfigs) globalCfg.kidConfigs=val.kidConfigs;
        kids=getKids();
        if(activeKid) activeKid=kids.find(k=>k.id===activeKid.id)||activeKid;
      }
    } catch(e){ console.warn('subscribeToGlobal error:', e); }
  });
}

// ==================== RUNTIME STATE ====================
let globalCfg = { shop: null, consequences: null, surprises: null, kidConfigs: null };

// Effective shop/surprises: from localStorage override or CONFIG defaults
function getShop(){ return globalCfg.shop || JSON.parse(JSON.stringify(CONFIG.shop)); }
function getSurprises(){ return globalCfg.surprises || JSON.parse(JSON.stringify(CONFIG.surprises)); }
function getConsequences(){ return globalCfg.consequences || JSON.parse(JSON.stringify(CONFIG.consequences)); }

// Effective kids array (merge saved chore configs)
function saveKidConfig(kidId, cfg){
  if(!globalCfg.kidConfigs) globalCfg.kidConfigs={};
  globalCfg.kidConfigs[kidId]=cfg;
  saveGlobal(globalCfg);
}

function loadKidConfig(kid){
  if(globalCfg.kidConfigs&&globalCfg.kidConfigs[kid.id]) return globalCfg.kidConfigs[kid.id];
  return null;
}

function getKids(){
  return CONFIG.kids.map(kid => {
    const saved = loadKidConfig(kid);
    return saved ? {...kid, ...saved} : {...kid};
  });
}

const states = {};
let kids = getKids();
// Initialize empty states — will be populated from Firebase
for(const k of kids) states[k.id] = deserializeState(null);

let activeKid = null;
let parentKidView = null;
let parentTab = 'approvals';
let initialLoadComplete = false;

function state(){
  if(!activeKid) return EMPTY_STATE();
  const s = states[activeKid.id];
  if(!s) return EMPTY_STATE();
  try {
    // Ensure done values are always Sets (Firebase may return plain arrays/objects)
    if(s.done){
      for(const [d, val] of Object.entries(s.done)){
        if(!(val instanceof Set)){
          s.done[d] = new Set(Array.isArray(val) ? val : (val && typeof val==='object' ? Object.values(val) : []));
        }
      }
    }
    if(!s.baseBedtime) s.baseBedtime='19:45';
    if(!s.bedtimeAdjustments) s.bedtimeAdjustments={};
    if(!s.pendingChores) s.pendingChores=[];
    if(!s.pendingShop) s.pendingShop=[];
    if(!s.oopsLog) s.oopsLog=[];
    if(!s.history) s.history=[];
  } catch(e){ console.warn('state() repair error:', e); }
  return s;
}
function kid(){ return activeKid; }
function activeKidFull(){ return kids.find(k=>k.id===activeKid.id); }

// ==================== DATES ====================
function today(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dayName(){ return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()]; }
function isWeekend(){ const d=new Date().getDay(); return d===0||d===6; }
function formatDate(s){ if(!s)return''; const[y,m,da]=s.split('-'); return`${m}/${da}/${y}`; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ==================== PENDING COUNT ====================
function totalPending(){
  let n=0;
  for(const k of kids){
    const s=states[k.id];
    n+=(s.pendingChores||[]).length+(s.pendingShop||[]).length;
  }
  return n;
}
function updateBadge(){
  const n=totalPending();
  const b=document.getElementById('header-badge');
  if(b){ b.style.display=n?'flex':'none'; b.textContent=n; }
}

// ==================== BEDTIME HELPERS ====================
function getTonightAdjustment(kidId){
  const s=states[kidId];
  if(!s) return 0;
  const adj=s.bedtimeAdjustments||{};
  return adj[today()]||0;
}

function addBedtimeAdjustment(kidId, minutes, reason){
  const s=states[kidId];
  if(!s) return;
  if(!s.bedtimeAdjustments) s.bedtimeAdjustments={};
  s.bedtimeAdjustments[today()]=(s.bedtimeAdjustments[today()]||0)+minutes;
  s.history=s.history||[];
  const sign=minutes>0?'+':'';
  s.history.unshift({date:today(),label:`🌙 ${reason} (${sign}${minutes} min bedtime)`,delta:0});
  saveKidState(kidId,s);
}

function formatBedtime(kidId){
  const s=states[kidId];
  if(!s) return '—';
  const base=s.baseBedtime||'19:45';
  const adj=getTonightAdjustment(kidId);
  const [h,m]=base.split(':').map(Number);
  const totalMins=h*60+m+adj;
  const finalH=Math.floor(((totalMins%1440)+1440)%1440/60);
  const finalM=((totalMins%60)+60)%60;
  const period=finalH>=12?'PM':'AM';
  const displayH=finalH>12?finalH-12:finalH===0?12:finalH;
  return `${displayH}:${String(finalM).padStart(2,'0')} ${period}`;
}

function bedtimeDisplay(kidId){
  const adj=getTonightAdjustment(kidId);
  const time=formatBedtime(kidId);
  if(adj===0) return `🌙 ${time}`;
  const sign=adj>0?'+':'';
  return `🌙 ${time} <span style="font-size:11px;font-weight:800;color:${adj>0?'#22c55e':'#ef4444'}">(${sign}${adj} min tonight)</span>`;
}

// Reset bedtime adjustments that are from previous days
function cleanOldBedtimeAdjustments(kidId){
  const s=states[kidId];
  if(!s||!s.bedtimeAdjustments) return;
  const t=today();
  const cleaned={};
  if(s.bedtimeAdjustments[t]) cleaned[t]=s.bedtimeAdjustments[t];
  s.bedtimeAdjustments=cleaned;
}

function isLightColor(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 > 155;
}

function selectKid(kidId){
  activeKid = kids.find(k=>k.id===kidId);

// ==================== STREAK ====================
function checkStreak(){
  const s=state(); const t=today();
  if(s.lastActiveDate===t)return;
  const d=new Date(); d.setDate(d.getDate()-1);
  const yest=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  if(s.lastActiveDate===yest) s.streak=(s.streak||0)+1;
  else if(s.lastActiveDate!==t) s.streak=1;
  s.lastActiveDate=t;
  saveKidState(activeKid.id,s);
}

function renderStreak(){
  const row=document.getElementById('streak-row');
  const streak=Math.min(state().streak||0,7);
  let html='';
  for(let i=0;i<7;i++) html+=`<div class="streak-dot ${i<streak?'lit':''}">${i<streak?'⭐':i+1}</div>`;
  html+=`<span class="streak-lbl">${state().streak||0}-day streak!</span>`;
  row.innerHTML=html;
}

// ==================== CHORES ====================
function choreVisible(chore){
  const d=chore.days;
  if(!d||d==='daily')return true;
  if(d==='weekends')return isWeekend();
  if(d==='weekdays')return!isWeekend();
  if(Array.isArray(d))return d.includes(dayName());
  return true;
}

function todayDone(){
  const d = state().done[today()];
  if(!d) return new Set();
  if(d instanceof Set) return d;
  return new Set(Array.isArray(d) ? d : Object.values(d));
}

function renderChores(){
  const container=document.getElementById('tab-chores');
  const kd=activeKidFull();
  const allChores=(kd.chores||[]).filter(choreVisible);
  // Required chores always appear first
  const visible=[...allChores.filter(c=>c.required), ...allChores.filter(c=>!c.required)];
  const done=todayDone();
  const pending=state().pendingChores||[];
  const pendingIds=new Set(pending.map(p=>p.choreId));
  const doneCount=[...done].filter(id=>(kd.chores||[]).find(c=>c.id===id)).length;
  const total=visible.length;
  const pct=total?Math.round((doneCount/total)*100):0;

  const adj=getTonightAdjustment(activeKid.id);
  const btColor=adj>0?'#f0fdf4':adj<0?'#fff1f2':'#f0f9ff';
  const btBorder=adj>0?'#86efac':adj<0?'#fca5a5':'#bae6fd';
  let html=`<div style="background:${btColor};border:1.5px solid ${btBorder};border-radius:12px;padding:10px 14px;margin-bottom:8px;font-family:'Fredoka One','Comic Sans MS',cursive,sans-serif;font-size:15px;color:#1e1b4b">
    ${bedtimeDisplay(activeKid.id)} tonight
  </div>
  <div class="sec-label">📋 Today's chores</div>
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-lbl">${doneCount} of ${total} done</div>
    <div class="chore-list" style="margin-top:.8rem">`;

  if(!visible.length){
    html+=`<div class="empty-msg">No chores today — enjoy your day! 🎉</div>`;
  } else {
    const requiredChores=(kd.chores||[]).filter(c=>c.required&&choreVisible(c));
    const allRequiredDone=true; // no longer blocks other chores
    for(const c of visible){
      const isDone=done.has(c.id);
      const isPending=pendingIds.has(c.id);
      const isRequired=!!c.required;
      const blocked=false;
      let cls=''; let checkIcon=''; let statusLine='';
      let checkStyle='';
      if(isDone){ cls='done'; checkIcon='✅'; checkStyle=''; }
      else if(isPending){ cls='pending'; checkIcon='⏳'; statusLine=`<div class="chore-status">⏳ Waiting for parent approval</div>`; checkStyle='background:#f97316;border-color:#f97316;color:white;'; }
      else if(isRequired){
        checkIcon='';
        checkStyle='border-color:#ef4444;background:white;';
        // render as a custom circle
      } else {
        checkIcon='';
        checkStyle='border-color:#eab308;background:white;';
      }
      const nameLabel=isRequired?`${c.name} <span style="font-size:11px;color:#ef4444;font-weight:800">(Required)</span>`:c.name;
      html+=`<div class="chore-card ${cls}${blocked?' blocked':''}" onclick="toggleChore('${c.id}')">
        <div class="chore-emoji">${c.emoji}</div>
        <div class="chore-info">
          <div class="chore-name">${nameLabel}</div>
          <div class="chore-coins">${c.bedtimeBonus?`🌙 +${c.bedtimeBonus} min bedtime`:`🪙 +${c.coins} coins`}</div>
          ${statusLine}
        </div>
        <div class="chore-check" style="border:3px solid ${isDone?'#22c55e':isPending?'#f97316':isRequired?'#ef4444':'#eab308'};background:${isDone?'#22c55e':isPending?'#f97316':'white'};border-radius:50%;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          ${isDone?'<span style="font-size:22px">✅</span>':isPending?'<span style="font-size:18px;color:white">⏳</span>':'<div style="width:18px;height:18px;border-radius:50%;border:3px solid '+( isRequired?'#ef4444':'#eab308')+';background:white"></div>'}
        </div>
      </div>`;
    }
  }
  html+=`</div>`;

  // Surprise
  const t=today();
  const currentState=state();
  if(!currentState.surprise) currentState.surprise={};
  if(!currentState.surprise[t]){
    const surps=getSurprises();
    currentState.surprise[t]={idx:Math.floor(Math.random()*surps.length),claimed:false};
    saveKidState(activeKid.id,currentState);
  }
  const sd=currentState.surprise[t]||{idx:0,claimed:false};
  const surps=getSurprises();
  const surprise=surps[sd.idx]||surps[0]||{text:'Do something kind today!',coins:5};
  const claimed=sd.claimed||false;

  html+=`<div class="surprise-box" style="margin-bottom:1.5rem">
    <div class="surprise-title">🎲 Bonus Challenge!</div>
    <div class="surprise-text">${claimed?'Amazing! Come back tomorrow for a new challenge! 🌟':surprise.text}</div>
    ${!claimed?`<div class="surprise-coins">🪙 Worth +${surprise.coins} coins!</div>`:''}
    <button class="btn-gold" ${claimed?'disabled':''} onclick="claimSurprise()">
      ${claimed?'✅ Claimed!':"🎉 I did it! Collect coins"}
    </button>
  </div>`;

  container.innerHTML=html;
}

function toggleChore(id){
  const t=today();
  const s=state();
  if(!s.done[t]) s.done[t]=new Set();
  const kd=activeKidFull();
  const chore=(kd.chores||[]).find(c=>c.id===id);
  if(!chore)return;

  const pending=s.pendingChores||[];
  const pendingIdx=pending.findIndex(p=>p.choreId===id);

  if(s.done[t].has(id)){
    // Undo completed chore
    s.done[t].delete(id);
    s.coins=Math.max(0,s.coins-chore.coins);
    addHistory(`Unchecked: ${chore.name}`,-chore.coins);
    showToast('Chore unchecked','bad');
    saveKidState(activeKid.id,s);
    renderAll();
    return;
  }

  if(pendingIdx>=0){
    // Cancel pending
    pending.splice(pendingIdx,1);
    s.pendingChores=pending;
    showToast('Approval request cancelled','bad');
    saveKidState(activeKid.id,s);
    updateBadge();
    renderAll();
    return;
  }

  // Submit for approval
  s.pendingChores=[...(s.pendingChores||[]),{id:uid(),choreId:id,choreName:chore.name,coins:chore.coins,bedtimeBonus:chore.bedtimeBonus||0,date:t}];
  showToast('Sent to parent for approval! ⏳','warn');
  saveKidState(activeKid.id,s);
  updateBadge();
  renderAll();
}

function claimSurprise(){
  const t=today();
  const s=state();
  if(!s.surprise) s.surprise={};
  const sd=s.surprise[t];
  if(!sd||sd.claimed)return;
  const surps=getSurprises();
  const surprise=surps[sd.idx]||surps[0]||{coins:5};
  s.coins+=surprise.coins;
  s.coinsEarned=(s.coinsEarned||0)+surprise.coins;
  s.surprise[t]={...sd,claimed:true};
  addHistory('🎲 Bonus challenge',surprise.coins);
  showToast(`Bonus! +${surprise.coins} coins! 🌟`);
  confetti();
  saveKidState(activeKid.id,s);
  renderAll();
}

function addHistory(label,delta){
  const s=state();
  s.history=s.history||[];
  s.history.unshift({date:today(),label,delta});
  if(s.history.length>100) s.history=s.history.slice(0,100);
}

function renderHistory(){
  const container=document.getElementById('tab-history');
  const h=state().history||[];
  let html=`<div class="sec-label">📜 Coin history</div>`;
  if(!h.length){ html+=`<div class="empty-msg" style="padding-top:2rem">No history yet — start doing chores! 💪</div>`; }
  else{
    html+=`<div class="history-list">`;
    for(const item of h){
      const plus=item.delta>=0;
      html+=`<div class="history-item">
        <div class="hi-left">${item.label}<div class="hi-date">${formatDate(item.date)}</div></div>
        <div class="hi-right ${!plus?'hi-neg':''}">${plus?'+':''}${item.delta} 🪙</div>
      </div>`;
    }
    html+=`</div>`;
  }
  container.innerHTML=html;
}

function renderApprovalsTab(){
  const s=states[parentKidView];
  const kd=kids.find(k=>k.id===parentKidView);

  const ps=s.pendingShop||[];
  if(!pc.length&&!ps.length){

  }

        <button class="btn-sm-danger" onclick="denyChore('${parentKidView}','${p.id}')">✗ Deny</button>
      </div>
    </div>`;
  }
  for(const p of ps){

      <div class="approval-meta">🛒 Shop · ${formatDate(p.date)}</div>

        <button class="btn-sm-danger" onclick="denyShop('${parentKidView}','${p.id}')">✗ Deny</button>
      </div>

function approveChore(kidId,pendingId){
  const s=states[kidId];
  const idx=(s.pendingChores||[]).findIndex(p=>p.id===pendingId);
  if(idx<0)return;
  const p=s.pendingChores[idx];
  s.pendingChores.splice(idx,1);
  if(!s.done[p.date]) s.done[p.date]=new Set();
  s.done[p.date].add(p.choreId);
  if(p.bedtimeBonus){
    addBedtimeAdjustment(kidId, p.bedtimeBonus, p.choreName);
  } else {
    s.coins+=p.coins;
    s.coinsEarned=(s.coinsEarned||0)+p.coins;
  }
  s.history=s.history||[];
  s.history.unshift({date:p.date,label:`✅ ${p.choreName}`,delta:p.coins});
  saveKidState(kidId,s);
  updateBadge();
  showToast('Chore approved! Coins awarded 🎉');
  renderParentPortal();
  if(activeKid&&activeKid.id===kidId) renderAll();
}

function denyChore(kidId,pendingId){
  const s=states[kidId];
  const idx=(s.pendingChores||[]).findIndex(p=>p.id===pendingId);
  if(idx<0)return;
  s.pendingChores.splice(idx,1);
  saveKidState(kidId,s);
  updateBadge();
  showToast('Chore denied','bad');
  renderParentPortal();
  if(activeKid&&activeKid.id===kidId) renderAll();
}

function approveShop(kidId,pendingId){
  const s=states[kidId];
  const idx=(s.pendingShop||[]).findIndex(p=>p.id===pendingId);
  if(idx<0)return;
  const p=s.pendingShop[idx];
  if(s.coins<p.cost){ showToast('Not enough coins!','bad'); return; }
  s.pendingShop.splice(idx,1);
  s.coins=Math.max(0,s.coins-p.cost);
  s.coinsDeducted=(s.coinsDeducted||0)+p.cost;
  s.history=s.history||[];
  s.history.unshift({date:p.date,label:`🛒 ${p.itemName}`,delta:-p.cost});
  saveKidState(kidId,s);
  updateBadge();
  showToast(`${p.itemEmoji} Purchase approved!`);
  renderParentPortal();

function applyCustomDeduction(){
  const text=document.getElementById('custom-con-text').value.trim();
  const coins=parseInt(document.getElementById('custom-con-coins').value,10)||0;
  const bedtimeMins=parseInt(document.getElementById('custom-con-bedtime').value,10)||0;
  if(!text){ showToast('Enter a reason','bad'); return; }

  const s=states[parentKidView];
  const kd=kids.find(k=>k.id===parentKidView);
  if(coins>0){
    s.coins=Math.max(0,s.coins-coins);
    s.coinsDeducted=(s.coinsDeducted||0)+coins;
  }
  if(bedtimeMins) addBedtimeAdjustment(parentKidView, bedtimeMins, text);
  s.oopsLog=s.oopsLog||[];
  s.oopsLog.unshift({date:today(),reason:text,coins,bedtimeMinutes:bedtimeMins});
  if(s.oopsLog.length>50) s.oopsLog=s.oopsLog.slice(0,50);
  s.history=s.history||[];
  s.history.unshift({date:today(),label:`🙊 ${text}`,delta:-coins});
  saveKidState(parentKidView,s);
  if(activeKid&&activeKid.id===parentKidView) renderAll();
  const msg=[coins?`-${coins} coins`:'',bedtimeMins?`${bedtimeMins} min bedtime`:''].filter(Boolean).join(', ');
  showToast(`${msg} applied to ${kd.name}`,'bad');
  renderParentPortal();
}

  if(s.oopsLog.length>50) s.oopsLog=s.oopsLog.slice(0,50);
  s.history=s.history||[];
  s.history.unshift({date:today(),label:`🙊 ${con.text}`,delta:-con.coins});

// ==================== EXPORT / IMPORT ====================
function exportConfig(){
  const kd=kids.find(k=>k.id===parentKidView);
  const exportData={
    version:1,
    exportDate:today(),
    kidId:parentKidView,
    kidName:kd.name,
    chores: (globalCfg.kidConfigs&&globalCfg.kidConfigs[parentKidView])||{chores:kd.chores},
    shop: globalCfg.shop||null,
    consequences: globalCfg.consequences||null,
    surprises: globalCfg.surprises||null,
  };
  const blob=new Blob([JSON.stringify(exportData,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`chore-quest-${parentKidView}-backup-${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported! Save that file somewhere safe 💾','info');
}

function importConfig(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version){ showToast('Invalid backup file','bad'); return; }
      if(data.chores){ if(!globalCfg.kidConfigs) globalCfg.kidConfigs={}; globalCfg.kidConfigs[data.kidId||parentKidView]=data.chores; }
      if(data.shop){ globalCfg.shop=data.shop; }
      if(data.consequences){ globalCfg.consequences=data.consequences; }
      if(data.surprises){ globalCfg.surprises=data.surprises; }
      saveGlobal(globalCfg);
      kids=getKids();
      if(activeKid) activeKid=kids.find(k=>k.id===activeKid.id)||activeKid;
      showToast('Customizations restored! ✅');
      renderParentPortal();
      if(activeKid) renderAll();
    }catch(err){
      showToast('Could not read file','bad');
    }
  };
  reader.readAsText(file);
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.className='toast',2500);
}

function confetti(){
  const colors=[activeKid.color,'#f59e0b','#22c55e','#ec4899','#3b82f6'];
  for(let i=0;i<22;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.2+Math.random()*1.4}s;animation-delay:${Math.random()*.4}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2800);
  }
}

  try {
    updateCoinDisplay();
    renderStreak();
    renderChores();
    renderShop();
    renderHistory();
    renderOops();
